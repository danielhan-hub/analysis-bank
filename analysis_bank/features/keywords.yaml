# Keyword categories for hybrid retrieval (Stage B).
#
# Each category groups synonymous tokens that should pin a procedure to a
# specific question shape — the kind of literal-string match that dense
# encoders sometimes drift past.
#
# How to extend:
#   1. Add a new category (snake_case key) with 3-10 surface forms.
#   2. Run `python scripts/build_keyword_matrix.py` to refresh
#      `keyword_matrix.csv` next to `analysis_features.csv`.
#   3. Re-run the eval harness (tests/retrieval_eval/) to confirm
#      recall@5 didn't regress.
#
# Token rules:
#   - Lowercased substring matches (case-insensitive). Multi-word
#     phrases match across whitespace.
#   - Prefer hyphenated and unhyphenated variants ("cost-to-convert"
#     and "cost to convert") to absorb writing styles.
#   - Avoid bare metric names that appear in every procedure
#     ("revenue", "users") — those wash out the signal.

